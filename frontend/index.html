<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit Core Service</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-container">
        
        <section class="hero-section">
            <div class="weather-group">
                <span class="weather-text">🌧️ Yağış: %80</span>
            </div>
            <img src="assets/hero-bg.jpg" alt="Şehir Görseli" class="hero-image">
        </section>

        <section class="input-container">
            <div class="input-box" id="input-start">
                <span class="placeholder">Başlangıç Noktası</span>
                <img src="assets/icon-arrow.svg" alt="Aşağı Ok" class="icon-arrow">
            </div>
            
            <div class="input-box" id="input-end">
                <span class="placeholder">Bitiş Noktası</span>
                <img src="assets/icon-arrow.svg" alt="Aşağı Ok" class="icon-arrow">
            </div>
        </section>

        <button class="btn-next" onclick="window.location.href='map.html'">Sonraki Sayfa</button>

    </main>
</body>
</html>
