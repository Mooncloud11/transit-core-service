<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Transit Core Service</title>
    <meta name="description" content="Smart public transit route planner with AI predictions">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-container" id="appContainer">

        <!-- Home Background -->
        <div class="home-bg">
            <img src="assets/home-bg.png" alt="" class="home-bg-img">
            <div class="home-bg-overlay"></div>
        </div>

        <!-- Status Bar -->
        <div class="status-bar">
            <span id="statusTime">12:00</span>
        </div>

        <!-- Weather Chip -->
        <div class="weather-chip-row">
            <div class="weather-chip">
                <span>🌧️ Rain: 80%</span>
            </div>
        </div>

        <!-- Hero Image -->
        <section class="hero-section">
            <img src="assets/hero-highway-new.png" alt="Night Highway" class="hero-image" id="heroImage">
            <div class="hero-overlay"></div>
        </section>

        <!-- Line Lock Banner -->
        <div class="hat-lock-banner" id="hatLockBanner" style="display:none;"></div>

        <!-- Inputs – Glass Card -->
        <section class="inputs-card glass-card">
            <div class="input-group">
                <label class="input-label">Starting Point</label>
                <div class="input-wrapper" id="start-container">
                    <div class="glass-input-box">
                        <input type="text" id="start-input" class="glass-input" placeholder="Search..." autocomplete="off">
                    </div>
                    <ul class="dropdown-list" id="start-dropdown"></ul>
                </div>
            </div>
            <div class="input-divider"></div>
            <div class="input-group">
                <label class="input-label">Destination</label>
                <div class="input-wrapper" id="end-container">
                    <div class="glass-input-box">
                        <input type="text" id="end-input" class="glass-input" placeholder="Search..." autocomplete="off">
                    </div>
                    <ul class="dropdown-list" id="end-dropdown"></ul>
                </div>
            </div>
        </section>

        <!-- Simulation – Glass Card -->
        <section class="sim-card glass-card">
            <div class="sim-header">
                <span class="sim-label">Simulation Time</span>
                <span class="sim-time-display" id="simTimeDisplay">12:00</span>
            </div>
            <div class="sim-controls" id="simControls" style="display:none;">
                <label class="sim-toggle-wrapper">
                    <input type="checkbox" id="simToggle">
                    <span class="sim-toggle-slider"></span>
                </label>
                <input type="range" id="simTimeSlider" class="sim-slider" min="360" max="1439" value="720" step="15">
            </div>
            <div class="sim-toggle-row">
                <label class="sim-toggle-wrapper">
                    <input type="checkbox" id="simToggleMain">
                    <span class="sim-toggle-slider"></span>
                </label>
            </div>
        </section>

        <!-- Find Route Button -->
        <button class="btn-find-route" id="btnNext">
            <span>Find Route</span>
        </button>

        <!-- Home Indicator -->
        <div class="home-indicator"></div>

    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
