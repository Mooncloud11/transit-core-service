<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transit Core Service</title>
    <meta name="description" content="Akıllı toplu taşıma güzergah planlayıcı">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: rgba(255,255,255,0.2); transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input:checked + .slider { background-color: #4A90D9; }
        input:checked + .slider:before { transform: translateX(20px); }
        input[type=range] { -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 4px; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #4A90D9; cursor: pointer; border: 2px solid #fff; }
    </style>
</head>
<body>
    <main class="app-container" id="appContainer">

        <div class="status-bar">
            <span id="statusTime">09:41</span>
        </div>

        <section class="hero-section">
            <div class="weather-group">
                <span class="weather-text">🌧️ Yağış: %80</span>
            </div>
            <img src="assets/hero-bg.jpg" alt="Şehir Görseli" class="hero-image">
        </section>

        <section class="inputs-section">
            <!-- Hat Kilidi Banner -->
            <div class="hat-lock-banner" id="hatLockBanner" style="display:none;"></div>

            <div class="input-wrapper" id="start-container" style="z-index: 2;">
                <div class="input-box">
                    <input type="text" id="start-input" class="search-input" placeholder="Başlangıç Noktası" autocomplete="off">
                    <img src="assets/icon-arrow.svg" alt="Ok" class="icon-arrow">
                </div>
                <ul class="dropdown-list" id="start-dropdown"></ul>
            </div>
            <div class="input-wrapper" id="end-container" style="z-index: 1;">
                <div class="input-box">
                    <input type="text" id="end-input" class="search-input" placeholder="Varış Noktası" autocomplete="off">
                    <img src="assets/icon-arrow.svg" alt="Ok" class="icon-arrow">
                </div>
                <ul class="dropdown-list" id="end-dropdown"></ul>
            </div>
        </section>

        <!-- SİMÜLASYON ZAMANI SEÇİCİSİ -->
        <section class="simulation-section" style="padding: 10px 24px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-size: 14px; color: #fff; font-weight: 500;">Simüle Edilecek Saat</span>
                <label class="switch" style="position: relative; display: inline-block; width: 44px; height: 24px;">
                    <input type="checkbox" id="simToggle" style="opacity: 0; width: 0; height: 0;">
                    <span class="slider round" style="position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px;"></span>
                </label>
            </div>
            
            <div id="simSliderContainer" style="display: none; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; backdrop-filter: blur(5px);">
                <div style="text-align: center; color: #4A90D9; font-size: 24px; font-weight: 700; margin-bottom: 10px;" id="simTimeDisplay">12:00</div>
                <input type="range" id="simTimeSlider" min="360" max="1439" value="720" style="width: 100%;" step="15">
                <div style="display: flex; justify-content: space-between; color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 5px;">
                    <span>06:00</span>
                    <span>23:59</span>
                </div>
            </div>
        </section>

        <button class="btn-next" id="btnNext">Güzergah Bul</button>

    </main>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
