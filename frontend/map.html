<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harita - Transit Core Service</title>
    <meta name="description" content="Güzergah haritası ve sıradaki otobüsler">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app-container page-transition-in" id="appContainer">

        <!-- AI Loading Overlay -->
        <div class="ai-loading-overlay" id="aiLoadingOverlay">
            <div class="ai-loading-content">
                <div class="ai-orb">
                    <div class="ai-orb-ring"></div>
                    <div class="ai-orb-core">🤖</div>
                </div>
                <h2 class="ai-loading-title">Yapay Zeka Analiz Ediyor</h2>
                <p class="ai-loading-text" id="aiLoadingText">Hat verileri inceleniyor...</p>
                <div class="ai-loading-bar">
                    <div class="ai-loading-bar-fill"></div>
                </div>
                <div class="ai-loading-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>

        <!-- Skeleton Loading (ilk yükleme) -->
        <div class="skeleton-overlay" id="skeletonOverlay">
            <div class="skeleton-spinner"></div>
            <span class="skeleton-text">Güzergah hesaplanıyor...</span>
            <div class="skeleton-bar"></div>
        </div>

        <div class="status-bar">
            <button class="back-button-map" id="btnBackToHome" title="Ana Sayfa">←</button>
            <span id="statusTime">09:41</span>
            <div class="status-spacer"></div>
        </div>

        <!-- Fallback Banner (AI çöktüğünde) -->
        <div class="fallback-banner" id="fallbackBanner" style="display:none;">
            <span>⚠️ AI servis yanıt veremiyor – Geçmiş ortalamalar kullanılıyor</span>
        </div>

        <!-- Üst Bilgi -->
        <header class="arrival-header" id="arrivalHeader">
            <div class="hat-badge" id="hatBadge">L01</div>
            <p class="subtitle">Beklenen Süre</p>
            <h1 class="time" id="etaTime">3<span class="min">Dk</span></h1>
        </header>

        <!-- Harita / Rota Paneli -->
        <section class="map-section" id="mapSection">
            <div class="map-overlay" id="mapOverlay"></div>

            <div class="route-panel" id="routePanel">
                <div class="route-timeline" id="routeTimeline">
                    <!-- JS render edecek -->
                </div>
            </div>

            <!-- FAB – Güzergah Detay Butonu -->
            <button class="fab-route-detail" id="fabRouteDetail" title="Güzergah Detayı">
                <svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
            </button>
        </section>

        <!-- Bottom Sheet – Sıradaki Otobüsler -->
        <section class="bottom-sheet collapsed" id="bottomSheet">
            <div class="drag-area" id="dragArea">
                <div class="drawer-handle"></div>
                <div class="drawer-title-row">
                    <h2 class="drawer-title">Sıradaki Otobüsler</h2>
                    <div class="drawer-title-line"></div>
                </div>
            </div>

            <!-- Sıradaki Otobüs Kartları – JS render edecek -->
            <ul class="bus-list" id="busList">
                <!-- JS render edecek -->
            </ul>
        </section>

    </main>

    <script src="data.js"></script>
    <script src="map.js"></script>
</body>
</html>
